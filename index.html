function subscribeLandlord(uid){
  unsub();
  var f=fb(); var db=f.db; var col=f.collection; var snap=f.onSnapshot; var q=f.query;
  _unsubs.push(snap(q(col(db,'users/'+uid+'/tenants')),function(s){S.tenants=s.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});render();}));

  subscribeUtilities(uid);
  subscribeRequests(uid);
  subscribeBulletin();
  subscribeTodos(uid);
  subscribeMileage(uid);
  subscribePayroll(uid);
  subscribeBudgets(uid);
  carryOverLockedUtils(uid);
  checkAndCreditBudgets(uid);
  // YTD — subscribe to all tenant rent receipts and all utility months for current year
  var curYr=new Date().getFullYear();
  MONTHS.forEach(function(m,i){
    var key=curYr+'-'+String(i+1).padStart(2,'0');
    _unsubs.push(snap(q(col(db,'users/'+uid+'/util_'+key)),function(s){
      var mo=s.docs.map(function(d){return Object.assign({},d.data(),{id:d.id,_monthKey:key});});

  var f2=fb();
  _unsubs.push(snap(f2.collectionGroup(f2.db,'receipts'),function(s){
    S.ytdRentReceipts=s.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});
    render();
  }));
}

function toggleUtilLock(id){
  var u=S.utilities.find(function(x){return x.id===id;});
  if(!u)return;
  var updated=Object.assign({},u,{locked:!u.locked});
  saveUtil(updated);
}
function carryOverLockedUtils(uid){
  // Get previous month key
  var now=new Date();
  var prevMonth=new Date(now.getFullYear(),now.getMonth()-1,1);
  var prevKey=prevMonth.getFullYear()+'-'+String(prevMonth.getMonth()+1).padStart(2,'0');
  var curKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  var f=fb();
  // Read previous month utilities
  f.getDocs(f.query(f.collection(f.db,'users/'+uid+'/util_'+prevKey))).then(function(prevSnap){
    var locked=prevSnap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});}).filter(function(u){return u.locked;});
    if(locked.length===0)return;
    // Read current month to avoid duplicates
    f.getDocs(f.query(f.collection(f.db,'users/'+uid+'/util_'+curKey))).then(function(curSnap){
      var curNames=curSnap.docs.map(function(d){return (d.data().name||'').toLowerCase();});
      locked.forEach(function(u){
        if(!curNames.includes((u.name||'').toLowerCase())){
          var newU=Object.assign({},u,{id:mkid(),date:new Date().toISOString().slice(0,10)});
          fsSet('users/'+uid+'/util_'+curKey+'/'+newU.id,newU);
        }
      });
    });
  });
}

function saveWorkerShift(tp){

  var f=fb();
  var shiftId=mkid();
  f.setDoc(f.doc(f.db,'users/'+tp.landlordUid+'/payroll/'+shiftId),{
    id:shiftId,
    workerId:pid(tp.email),
    workerName:tp.name||S.user.email,
    hourlyRate:Number(tp.hourlyRate)||0,
    hours:Number(d.hours),
    date:d.date,
    notes:d.notes||'',
    paid:false,
    createdAt:new Date().toISOString()
  }).catch(function(e){alert('Could not save shift: '+e.message);});
}

function checkAndCreditBudgets(uid){
  // On login — check each worker with auto-reload enabled, credit if needed
  var f=fb();
  var today=new Date();
  var curKey=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');
  f.getDocs(f.query(f.collection(f.db,'users/'+uid+'/payrollBudgets'))).then(function(snap){
    snap.docs.forEach(function(d){
      var cfg=Object.assign({},d.data(),{id:d.id});
      if(!cfg.autoReload)return;
      if(cfg.lastCredited===curKey)return; // Already credited this period
      var creditDay=Number(cfg.creditDay)||1;
      if(today.getDate()<creditDay)return; // Not time yet
      // Credit the budget
      var newBalance=(Number(cfg.balance)||0)+(Number(cfg.amount)||500);
      fsSet('users/'+uid+'/payrollBudgets/'+cfg.id,Object.assign({},cfg,{balance:newBalance,lastCredited:curKey}));
    });
  });
}
function deductFromBudget(workerId,amount){
  var cfg=S.payrollBudgets[workerId];
  if(!cfg)return; // No budget configured — skip silently
  var newBalance=(Number(cfg.balance)||0)-amount;
  fsSet('users/'+S.user.uid+'/payrollBudgets/'+workerId,Object.assign({},cfg,{balance:newBalance}));
}

function toggleShiftPaid(id){
  var s=S.payrollShifts.find(function(x){return x.id===id;});
  if(!s)return;
  var nowPaid=!s.paid;
  var shiftAmt=(Number(s.hours)||0)*(Number(s.hourlyRate)||0);
  saveShift(Object.assign({},s,{paid:nowPaid}));
  if(nowPaid&&shiftAmt>0){
    deductFromBudget(s.workerId,shiftAmt);
  } else if(!nowPaid&&shiftAmt>0){
    // Undo — add back to budget
    deductFromBudget(s.workerId,-shiftAmt);
  }
}

function doAuth(){
  var f=fb();
  var isSignup=S.authMode==='tenant';
  if(isSignup&&S.authPassword!==S.authConfirmPassword){
    S.authError='Passwords do not match!';render();return;
  }
  if(isSignup&&S.authPassword.length<6){
    S.authError='Password needs 6+ characters.';render();return;
  }
  S.authLoading=true;S.authError='';render();
  var p=S.authMode==='login'||S.authMode==='tenantLogin'
    ?f.signInWithEmailAndPassword(f.auth,S.authEmail.trim().toLowerCase(),S.authPassword)
    :f.createUserWithEmailAndPassword(f.auth,S.authEmail.trim().toLowerCase(),S.authPassword);
  p.then(function(){S.authLoading=false;S.authConfirmPassword='';}).catch(function(e){
    S.authError=e.code==='auth/invalid-credential'?'Incorrect email or password.':e.code==='auth/email-already-in-use'?'Email already registered.':e.code==='auth/weak-password'?'Password needs 6+ characters.':e.message;
    S.authLoading=false;render();
  });
}

function handleFileScan(file){
  if(!file||!file.type.startsWith('image/')){S.scanError='Please upload an image.';render();return;}
  S.scanError='';S.scanning=true;render();
  var reader=new FileReader();
  reader.onload=function(){
    var base64=reader.result.split(',')[1];
    var previewUrl=URL.createObjectURL(file);
    fetch('https://rellikrentals-api.rellikrental.workers.dev/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:base64}},{type:'text',text:'Analyze this receipt. Respond ONLY with JSON, no markdown:\n{"vendor":"name","date":"YYYY-MM-DD","total":number,"category":"one of ['+CATS.map(function(c){return '"'+c+'"';}).join(',')+'"]","items":["item1"],"confidence":"high|medium|low"}\nIf not a receipt set total to 0.'}]}]})})
    .then(function(r){return r.json();})
    .then(function(data){
      var txt=data.content.map(function(b){return b.text||'';}).join('').replace(/`{3}json|`{3}/g,'').trim();
      var result=JSON.parse(txt);
      var r={id:mkid(),fileName:file.name,previewUrl:previewUrl,vendor:result.vendor||'Unknown',date:result.date||new Date().toISOString().slice(0,10),total:Number(result.total)||0,category:result.category||'Other',property:'all',expType:'operating',items:result.items||[],confidence:result.confidence||'low'};
      S.receipts.unshift(Object.assign({},r));render();
      saveReceipt(r);
    })
    .catch(function(){S.scanError="Couldn't read receipt — try a clearer photo.";})
    .finally(function(){S.scanning=false;render();});
  };
  reader.readAsDataURL(file);
}

function openSheet(name,data){S.sheet=name;S.sheetData=data||{};S.pdfsDone=false;if(name==='receiptGen')S.selectedForReceipt=[];renderSheet();}
function closeSheet(){S.sheet=null;S.sheetData={};document.querySelectorAll('.sheet-overlay').forEach(function(e){e.remove();});}
function toggleReceiptSel(id){S.selectedForReceipt=S.selectedForReceipt.includes(id)?S.selectedForReceipt.filter(function(x){return x!==id;}):[...S.selectedForReceipt,id];renderSheet();}

function inp(lbl,type,val,key,ph){
  return '<div><label>'+lbl+'</label><input type="'+type+'" placeholder="'+(ph||lbl)+'" value="'+esc(val)+'" oninput="S.sheetData[\''+key+'\']=this.value" onchange="S.sheetData[\''+key+'\']=this.value"/></div>';
}

function renderSheet(){
  document.querySelectorAll('.sheet-overlay').forEach(function(e){e.remove();});
  if(!S.sheet)return;
  var el=document.createElement('div');el.className='sheet-overlay';
  var body='',footer='',title='';

  if(S.sheet==='addTenant'||S.sheet==='editTenant'){
    var d=S.sheetData; var isEdit=S.sheet==='editTenant';
    title=(isEdit?'Edit':'Add')+' Tenant';
    var propSel=S.properties.length>0
      ?'<select onchange="S.sheetData.property=this.value"><option value="">— Select property —</option>'+S.properties.map(function(p){return '<option value="'+esc(p.name)+'"'+(d.property===p.name?' selected':'')+'>'+esc(p.name)+'</option>';}).join('')+'<option value="other">Other…</option></select>'
      :'<input type="text" placeholder="Property Name" value="'+esc(d.property||'')+'" oninput="S.sheetData.property=this.value"/>';
    body='<div class="frow">'+inp('Full Name','text',d.name||'','name')+inp('Unit','text',d.unit||'','unit')+'<div><label>Property</label>'+propSel+'</div>'+inp('Monthly Rent ($)','number',d.rent||'','rent')+inp('Email','email',d.email||'','email')+inp('Phone','tel',d.phone||'','phone')+inp('Lease End Date','date',d.lease||'','lease')
      +'<div style="border-top:1px solid #2e2c3d;padding-top:12px;margin-top:4px"><label style="color:#7c7a90;font-size:12px">SECONDARY TENANT (optional)</label><input type="text" placeholder="Full name" value="'+esc(d.name2||'')+'" oninput="S.sheetData.name2=this.value" style="margin-top:6px"/><div style="display:flex;align-items:center;gap:10px;margin-top:10px"><div onclick="S.sheetData.name2OnReceipt=!S.sheetData.name2OnReceipt;renderSheet()" style="width:48px;height:26px;border-radius:99px;background:'+(d.name2OnReceipt?'#6366f1':'#2e2c3d')+';position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0"><div style="position:absolute;top:3px;left:'+(d.name2OnReceipt?'23px':'3px')+';width:20px;height:20px;border-radius:50%;background:#fff;transition:left 0.2s"></div></div><span style="font-size:13px;color:#c0bdd8;cursor:pointer" onclick="S.sheetData.name2OnReceipt=!S.sheetData.name2OnReceipt;renderSheet()">Include on rent receipts</span></div></div>'
      +'</div>';

      {v:'3.1',items:['Forgot Password — reset link sent via Firebase to your email','Works on both Landlord and Tenant login screens']},

      {v:'3.0',items:['Mileage tracker in Expenses tab — log drives with date, distance, property & notes','Mileage summary on hero banner — monthly total at a glance','Expenses tab rename (formerly Receipts)','Maintenance worker to-do permissions — can check off but not add or delete','Desktop display — app centered with shadow on large screens']},

      {v:'2.5',items:['Two row navigation bar','Documents moved to Quick Actions','Properties tab decluttered','Receipt notes field for tax time','Branded footer']},

      {v:'2.2',items:['Tenant login & signup separated','Landlord signup removed for security','Maintenance request error handling']},

function doSheetAddTenant(){if(!S.sheetData.name||!S.sheetData.unit){alert('Name and unit required');return;}var d=S.sheetData;closeSheet();var t=Object.assign({},d,{id:mkid(),rent:Number(d.rent)||0,paid:false,dueDate:new Date().getFullYear()+'-'+String(new Date().getMonth()+2).padStart(2,'0')+'-01'});saveTenant(t);}
function doSheetAddShift(){
  var d=S.sheetData;
  if(!d.workerId){alert('Please select a worker');return;}
  if(!d.hours||isNaN(Number(d.hours))||Number(d.hours)<=0){alert('Please enter valid hours');return;}
  if(!d.date){alert('Please enter a date');return;}
  var worker=S.tenants.find(function(t){return t.id===d.workerId;});
  closeSheet();
  var wid=worker&&worker.email?pid(worker.email):d.workerId;
  saveShift({id:mkid(),workerId:wid,workerName:worker?worker.name:'',hourlyRate:Number(worker&&worker.hourlyRate)||0,hours:Number(d.hours),date:d.date,notes:d.notes||'',paid:false,createdAt:new Date().toISOString()});
}
function doSheetEditTenant(){var d=S.sheetData;closeSheet();saveTenant(Object.assign({},d,{rent:Number(d.rent)||0}));}
function doSheetAddProp(){if(!S.sheetData.name){alert('Property name required');return;}var d=S.sheetData;closeSheet();saveProp(Object.assign({},d,{id:mkid()}));}
function doSheetEditProp(){var d=S.sheetData;closeSheet();saveProp(d);}
function doSheetAddUtil(){if(!S.sheetData.name||!S.sheetData.amount){alert('Name and amount required');return;}var d=S.sheetData;closeSheet();saveUtil({id:mkid(),name:d.name,amount:Number(d.amount)||0,property:d.property||'',date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})});}
function doSheetEditReceipt(){var r=Object.assign({},S.sheetData,{total:Number(S.sheetData.total)});closeSheet();saveReceipt(r);}
function applyMonthPicker(){
  S.viewMonth=S.sheetData.month;
  S.viewYear=S.sheetData.year;
  closeSheet();
  if(S.user && !S.isTenant) subscribeUtilities(S.user.uid);
  render();
}
function doSubmitRequest(){
  if(!S.sheetData.title){alert('Please enter a title');return;}
  var tp=S.tenantProfile;
  if(!tp){alert('Profile not loaded yet, please try again.');return;}
  var r={
    id:mkid(),
    title:S.sheetData.title,
    description:S.sheetData.description||'',
    urgency:S.sheetData.urgency||'Low',
    status:'New',
    tenantEmail:tp.email||S.user.email,
    tenantName:tp.name||'',
    tenantUid:S.user.uid,
    unit:tp.unit||'',
    property:tp.property||'',
    landlordUid:tp.landlordUid||'',
    date:new Date().toISOString().slice(0,10)
  };
  closeSheet();
  saveRequest(r).then(function(){
    // Notify landlord of new request
    if(r.landlordUid){
      sendPushNotification(r.landlordUid,false,'🔧 New Maintenance Request',r.tenantName+': "'+r.title+'" ('+r.urgency+' urgency)','maintenance_new');
    }
    render();
  }).catch(function(e){alert('Could not submit: '+e.message);});
}
function makePDFFromReceipt(rid){
  var r=S.receipts.find(function(x){return x.id===rid;});
  if(!r)return;
  var t={name:r.tenantName,unit:r.unit,property:r.property,email:r.tenantEmail,rent:r.amount,lease:S.tenantProfile&&S.tenantProfile.lease||'—'};
  makePDF(t,r.month,r.year);
}
function confirmDelProp(id){if(!confirm('Delete this property?'))return;delProp(id);}

  else if(S.tab==='properties'){

// ── Init ───────────────────────────────────────────────────────────
function initApp(){
  var f=fb();
  f.onAuthStateChanged(f.auth,function(user){
    S.user=user; S.authReady=true;
    if(user){
      if(user.email.toLowerCase()===LANDLORD_EMAIL.toLowerCase()){
        S.isTenant=false; subscribeLandlord(user.uid);
      }else{
        S.isTenant=true; subscribeTenantPortal(user.email.toLowerCase());
      }
      initNotifications();
    }else{
      S.isTenant=false; S.tenantProfile=null;
    }
    render();
  });
}

function initNotifications(){
  if(!('serviceWorker' in navigator)||!('Notification' in window))return;
  navigator.serviceWorker.register('/sw.js').then(function(reg){
    var f=fb();
    var messaging=f.fcmMessaging;
    _messaging=messaging;
    f.onMessage(messaging,function(payload){
      var title=payload.notification?.title||'RellikRentals';
      var body=payload.notification?.body||'';
      if(Notification.permission==='granted'){
        new Notification(title,{body:body});
      }
    });
    // Wait for service worker to be active
    var sw=reg.installing||reg.waiting||reg.active;
    var doToken=function(){
      if(Notification.permission==='default'){
        Notification.requestPermission().then(function(perm){
          if(perm==='granted') getFCMToken(reg,messaging);
        });
      } else if(Notification.permission==='granted'){
        getFCMToken(reg,messaging);
      }
    };
    if(reg.active){
      doToken();
    } else {
      sw.addEventListener('statechange',function(e){
        if(e.target.state==='activated') doToken();
      });
    }
  }).catch(function(e){console.log('SW registration failed:',e);});
}

function getFCMToken(reg,messaging){
  var f=fb();
  f.getToken(messaging,{vapidKey:window.VAPID_KEY,serviceWorkerRegistration:reg}).then(function(token){
    if(token&&S.user){
      var uid=S.isTenant?(S.tenantProfile?S.tenantProfile.id:S.user.uid):S.user.uid;
      var path=S.isTenant?'tenantProfiles/'+uid:'users/'+uid;
      f.setDoc(f.doc(f.db,path+'/fcmTokens/'+token.slice(-20)),{token:token,updated:new Date().toISOString()},{merge:true}).catch(function(){});
    }
  }).catch(function(e){console.log('FCM error:',e.message);});
}

function sendPushNotification(toUid, isTenantTarget, title, body, tag){
  // Write notification request to Firestore — Cloudflare Worker picks it up
  var f=fb();
  var notifId=mkid();
  f.setDoc(f.doc(f.db,'notificationQueue/'+notifId),{
    toUid:toUid,
    isTenant:isTenantTarget,
    title:title,
    body:body,
    tag:tag||'rellikrentals',
    createdAt:new Date().toISOString(),
    sent:false
  }).catch(function(){});
}

if(window._fb){initApp();}else{window.addEventListener('fbReady',initApp);}

</script>
